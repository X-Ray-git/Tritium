name: Internal Release Builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: internal-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-version:
    name: Validate Release Version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate tag matches pubspec
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          PUBSPEC_VERSION="$(sed -nE 's/^version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+)\+[0-9]+$/\1/p' pubspec.yaml)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$PUBSPEC_VERSION" ]; then
            echo "Could not parse pubspec.yaml version."
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pubspec version $PUBSPEC_VERSION."
            exit 1
          fi

  android:
    name: Android APK
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.6'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos lib test

      - name: Test
        run: flutter test

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing Android signing secrets. Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD."
            exit 1
          fi
          mkdir -p android/app
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=app/upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Collect APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/Tritium-android-${GITHUB_REF_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: tritium-android
          path: dist/*.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: android
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git fetch --force --no-tags origin "refs/tags/$TAG_NAME:refs/tags/$TAG_NAME"
          if [ "$(git cat-file -t "refs/tags/$TAG_NAME")" != "tag" ]; then
            echo "$TAG_NAME must be an annotated tag. Use scripts/release.sh to create releases."
            exit 1
          fi
          ANNOTATION="$(git tag -l --format='%(contents)' "$TAG_NAME")"
          if [ -z "$(printf '%s' "$ANNOTATION" | tr -d '[:space:]')" ]; then
            echo "$TAG_NAME has an empty annotation. Refusing to create release notes from a commit message."
            exit 1
          fi
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* \
              --title "$TAG_NAME" \
              --notes "$ANNOTATION"
          fi
