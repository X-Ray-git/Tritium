name: tritium
description: "知乎第三方客户端 - Zhihu third-party client"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  get: ^4.7.2

  # 网络请求
  dio: ^5.7.0
  # 图片加载
  cached_network_image: ^3.4.1

  # 本地存储
  path_provider: ^2.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # WebView 用于登录
  flutter_inappwebview: ^6.1.5

  # Toast/Dialog
  flutter_smart_dialog: ^4.9.8+5

  # HTML 渲染
  flutter_html: ^3.0.0-beta.2
  html: ^0.15.6
  # 获取 app 信息
  package_info_plus: ^9.0.0
  # 正文外部链接和暂无原生阅读页的内容
  url_launcher: ^6.3.2
  # 高帧率
  flutter_displaymode: ^0.7.0

  # 加密
  crypto: ^3.0.6

  # 富文本公式
  flutter_math_fork: ^0.7.4

  # 保存到相册
  gal: ^2.3.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  image_path: "assets/images/logo/icon.jpg"
  adaptive_icon_background: "#3961FF"
  adaptive_icon_foreground: "assets/images/logo/icon.jpg"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/logo/
